<script type="module">
function showErr(stage, err) {
  var el = document.getElementById('error-display');
  if (el) {
    el.style.display = 'block';
    el.textContent = 'STAGE: ' + stage + '\n\nERROR: ' + (err && err.message ? err.message : String(err)) +

let h, render, useState, useEffect, useMemo, htm;

  const hooksMod = await import('https://esm.sh/preact@10.19.3/hooks');
  useState = hooksMod.useState; useEffect = hooksMod.useEffect; useMemo = hooksMod.useMemo;
} catch (e) { showErr('import preact/hooks', e); throw e; }

  const htmMod = await import('https://esm.sh/htm@3.1.1');
  htm = htmMod.default;
} catch (e) { showErr('import htm', e); throw e; }

if (!window.HOOPERS_DATA) {
  showErr('data check', new Error('window.HOOPERS_DATA is undefined — drills-data.js did not load'));
  throw new Error('no data');
}

const html = htm.bind(h);
const { ENVIRONMENTS, BASKETBALL_DRILLS, STRENGTH_DRILLS, WEEKLY_TEMPLATE, PREGAME_WARMUP, POSTGAME_RECOVERY, BADGES } = window.HOOPERS_DATA;
const ALL_DRILLS = [...BASKETBALL_DRILLS, ...STRENGTH_DRILLS];

// PROFILE SYSTEM — each player has isolated storage
// Active profile ID lives in localStorage; all other data is scoped under it
const PROFILE_LIST_KEY = 'hp_profiles';      // [{id, name, color, createdAt}]
const ACTIVE_PROFILE_KEY = 'hp_active';      // string id

function listProfiles() {
  try { return JSON.parse(localStorage.getItem(PROFILE_LIST_KEY) || '[]'); } catch(e) { return []; }
}
function saveProfileList(list) { localStorage.setItem(PROFILE_LIST_KEY, JSON.stringify(list)); }
function getActiveProfileId() { return localStorage.getItem(ACTIVE_PROFILE_KEY); }
function setActiveProfileId(id) { localStorage.setItem(ACTIVE_PROFILE_KEY, id); }
function currentProfile() {
  const id = getActiveProfileId();
  return listProfiles().find(p => p.id === id) || null;
}
function createProfile(name, color) {
  const list = listProfiles();
  const id = 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
  const profile = { id, name: name.trim(), color: color || '#ff6b1a', createdAt: new Date().toISOString() };
  list.push(profile);
  saveProfileList(list);
  return profile;
}
function deleteProfile(id) {
  saveProfileList(listProfiles().filter(p => p.id !== id));
  // Clean up profile-scoped localStorage entries
  const prefix = 'hp_' + id + '_';
  const toRemove = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(prefix)) toRemove.push(k);
  }
  toRemove.forEach(k => localStorage.removeItem(k));
  // If deleting active, clear active
  if (getActiveProfileId() === id) localStorage.removeItem(ACTIVE_PROFILE_KEY);
}

// Profile-scoped localStorage helpers
function pkey(key) {
  const pid = getActiveProfileId() || 'default';
  return 'hp_' + pid + '_' + key;
}

// STORAGE (IndexedDB, profile-scoped via store key prefix)
const DB_NAME = 'hoopers-path';
const DB_VERSION = 2;  // bumped for profile support

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => resolve(req.result);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      const oldVersion = e.oldVersion;
      // v1 had keyPath 'date' on workouts and checkins
      // v2 uses keyPath 'key' to support multi-profile scoping
      if (oldVersion < 2) {
        // Migrate workouts
        if (db.objectStoreNames.contains('workouts')) {
          // Need to read existing data, then recreate the store
          // But upgradeneeded txn can only do schema, not cross-store reads here cleanly.
          // Simplest: delete the old store and recreate. User will lose workout history,
          // but localStorage PRs, badges, and settings are preserved since they're separate.
          // Trade-off accepted: this only affects upgrade path, new users unaffected.
          db.deleteObjectStore('workouts');
        }
        db.createObjectStore('workouts', { keyPath: 'key' });

        if (db.objectStoreNames.contains('checkins')) {
          db.deleteObjectStore('checkins');
        }
        db.createObjectStore('checkins', { keyPath: 'key' });

        if (!db.objectStoreNames.contains('games')) {
          db.createObjectStore('games', { keyPath: 'id', autoIncrement: true });
        }
        // games store structure is compatible — no need to recreate
      } else {
        // Fresh install
        if (!db.objectStoreNames.contains('workouts')) db.createObjectStore('workouts', { keyPath: 'key' });
        if (!db.objectStoreNames.contains('games'))    db.createObjectStore('games',    { keyPath: 'id', autoIncrement: true });
        if (!db.objectStoreNames.contains('checkins')) db.createObjectStore('checkins', { keyPath: 'key' });
      }
    };
  });
}

// Keys include profile ID so data stays separated
function scopedKey(date) {
  const pid = getActiveProfileId() || 'default';
  return pid + '::' + date;
}

async function idbPut(store, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const payload = { ...value, key: scopedKey(value.date), profile: getActiveProfileId() };
    const req = tx.objectStore(store).put(payload);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGetAll(store) {
  const db = await openDB();
  const pid = getActiveProfileId();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => {
      // Filter to current profile
      const all = req.result || [];
      resolve(all.filter(r => !r.profile || r.profile === pid));
    };
    req.onerror = () => reject(req.error);
  });
}
async function idbGetAllAcrossProfiles(store) {
  // For leaderboard — gets data from ALL profiles on this device
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}
async function idbAdd(store, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const payload = { ...value, profile: getActiveProfileId() };
    const req = tx.objectStore(store).add(payload);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// WORKOUT GEN — now env-aware
function pickDrills(category, count, pool, filter, env) {
  let available = pool.filter(d => d.category === category);
  if (env) available = available.filter(d => !d.envs || d.envs.includes(env));
  if (filter) {
    const ids = filter.split(',');
    available = available.filter(d => ids.includes(d.id));
  }
  if (available.length === 0) return [];
  const shuffled = [...available].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, Math.min(count, available.length));
}

// Find a substitute category when the original can't be filled in a given env
function findSubstituteCategory(origCategory, env) {
  // Fall-back chains: map to something achievable in a constrained env
  const chains = {
    'shooting':   ['ball-handling', 'footwork', 'core', 'upper'],
    'finishing':  ['footwork', 'ball-handling', 'plyo', 'lower'],
    'footwork':   ['ball-handling', 'plyo', 'defense', 'core'],
    'defense':    ['footwork', 'plyo', 'core'],
    'ball-handling': ['core', 'upper', 'mobility'],
    'conditioning':['plyo', 'lower', 'core'],
    'lower':      ['core', 'mobility'],
    'upper':      ['core', 'mobility'],
    'plyo':       ['lower', 'core'],
    'core':       ['mobility'],
    'mobility':   ['core'],
    'warmup':     ['mobility'],
  };
  const options = chains[origCategory] || [];
  for (const alt of options) {
    const hasDrills = ALL_DRILLS.some(d => d.category === alt && (!d.envs || d.envs.includes(env)));
    if (hasDrills) return alt;
  }
  return null;
}

function generateWorkout(day, fatigueMod, env, gameContext) {
  let template = WEEKLY_TEMPLATE[day];
  if (!template) return null;

  // GAME-AWARE OVERRIDES — these take priority over fatigueMod
  // gameContext: { gameToday, gameTomorrow, playedYesterday }
  if (gameContext) {
    if (gameContext.gameToday && gameContext.gameTomorrow) {
      // Back-to-back games — minimal work, mobility/shooting only
      template = { ...template, title: 'Tournament Day — Minimal',
        blocks: [
          { label: 'Mobility', category: 'mobility', count: 2 },
          { label: 'Form Shooting (light)', category: 'shooting', count: 2 },
        ]
      };
    } else if (gameContext.gameToday) {
      // Game day — pre-game warmup template
      template = WEEKLY_TEMPLATE.saturday || template;
      template = { ...template, title: 'Game Day Warmup' };
    } else if (gameContext.gameTomorrow) {
      // Day before game — skip heavy legs, light shooting + upper + mobility
      template = { ...template, title: template.title + ' (Game Tomorrow)',
        blocks: template.blocks.map(b => {
          if (b.category === 'lower' || b.category === 'plyo' || b.category === 'conditioning') {
            return { ...b, category: 'mobility', label: 'Mobility (saving legs)' };
          }
          return b;
        })
      };
    } else if (gameContext.playedYesterday) {
      // Day after game — recovery focused
      template = { ...template, title: 'Recovery (Played Yesterday)',
        blocks: [
          { label: 'Mobility', category: 'mobility', count: 3 },
          { label: 'Light Shooting', category: 'shooting', count: 2 },
          { label: 'Light Upper', category: 'upper', count: 2 },
        ]
      };
    }
  }

  // Fatigue adjustments (only if no game context overrode)
  if (fatigueMod === 'swap-strength') {
    template = { ...template, title: template.title + ' (Adjusted)',
      blocks: template.blocks.map(b => (b.category === 'lower' || b.category === 'upper' || b.category === 'plyo')
        ? { ...b, category: 'mobility', label: 'Mobility (swapped)' } : b)
    };
  } else if (fatigueMod === 'upper-only') {
    template = { ...template, title: template.title + ' (Upper Only)',
      blocks: template.blocks.map(b => (b.category === 'lower' || b.category === 'plyo')
        ? { ...b, category: 'upper', label: 'Upper (swapped)' } : b)
    };
  }
  const sections = template.blocks.map(block => {
    let drills = pickDrills(block.category, block.count, ALL_DRILLS, block.filter, env);
    let effectiveCategory = block.category;
    let effectiveLabel = block.label;
    let substituted = false;
    if (drills.length === 0 && env) {
      // Try fallback category
      const sub = findSubstituteCategory(block.category, env);
      if (sub) {
        drills = pickDrills(sub, block.count, ALL_DRILLS, null, env);
        effectiveCategory = sub;
        effectiveLabel = block.label + ' → ' + sub;
        substituted = true;
      }
    }
    return { ...block, category: effectiveCategory, label: effectiveLabel, substituted, drills };
  }).filter(s => s.drills.length > 0);  // drop empty blocks entirely
  return { ...template, sections };
}


function computeStreak(workouts, checkins) {
  const active = new Set();
  workouts.forEach(w => { if (w.completed) active.add(w.date); });
  checkins.forEach(c => { if (c.recoveryLogged) active.add(c.date); });
  let streak = 0;
  let d = new Date();
  if (!active.has(dateStr(d))) d.setDate(d.getDate() - 1);
  while (active.has(dateStr(d))) {
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

function computeSleepStreak(checkins) {
  const sorted = [...checkins].sort((a, b) => b.date.localeCompare(a.date));
  let streak = 0;
  for (const c of sorted) {
    if ((c.sleepHours || 0) >= 8) streak++;
    else break;
  }
  return streak;
}

function evaluateBadges(stats, currentUnlocked) {
  const newly = [];
  for (const badge of BADGES) {
    if (currentUnlocked[badge.id]) continue;
    const c = badge.condition;
    let unlock = false;
    switch (c.type) {
      case 'streak': unlock = stats.streak >= c.value; break;
      case 'workouts': unlock = stats.workoutCount >= c.value; break;
      case 'ftMade': unlock = stats.ftMade >= c.value; break;
      case 'ftPct': unlock = stats.bestFtPct >= c.value; break;
      case 'pushupsTotal': unlock = stats.pushupsTotal >= c.value; break;
      case 'pullupPR': unlock = stats.pullupPR >= c.value; break;
      case 'gamesPlayed': unlock = stats.gamesPlayed >= c.value; break;
      case 'sleepStreak': unlock = stats.sleepStreak >= c.value; break;
      case 'checkins': unlock = stats.checkinCount >= c.value; break;
    }
    if (unlock) newly.push(badge);
  }
  return newly;
}

function MiniChart({ data, unit }) {
  if (data.length < 2) return null;
  const values = data.map(d => d.y);
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;
  const points = data.map((d, i) => {
    const x = (i / (data.length - 1)) * 100;
    const y = 100 - ((d.y - min) / range) * 80 - 10;
    return x + ',' + y;
  });
  const path = 'M ' + points.join(' L ');
  return html`
    <div>
      <div class="flex justify-between font-mono text-10 text-chalk-40 mb-1">
        <span>Min: ${min.toFixed(0)}${unit}</span>
        <span>Max: ${max.toFixed(0)}${unit}</span>
      </div>
      <svg viewBox="0 0 100 100" class="w-full h-24" preserveAspectRatio="none">
        <path d=${path} fill="none" stroke="#ff6b1a" stroke-width="1" vector-effect="non-scaling-stroke" />
        ${points.map((p, i) => {
          const parts = p.split(',');
          return html`<circle key=${i} cx=${parts[0]} cy=${parts[1]} r="1.5" fill="#ff6b1a" vector-effect="non-scaling-stroke" />`;
        })}
      </svg>
      <div class="font-mono text-10 text-chalk-40 text-center mt-1">Last ${data.length} sessions</div>
    </div>
  `;
}

// WORKOUT VIEW
function WorkoutView({ day, checkin, env, onSave, onPRUpdate, prs, onExit }) {
  let fatigueMod = null;
  if (checkin) {
    if (checkin.energy <= 3 || checkin.soreness >= 8) fatigueMod = 'swap-strength';
    else if (checkin.soreness >= 6 && checkin.soreLegs) fatigueMod = 'upper-only';
  }
  const gameContext = checkin ? {
    gameToday: !!checkin.gameToday,
    gameTomorrow: !!checkin.gameTomorrow,
    playedYesterday: !!checkin.playedYesterday,
  } : null;
  const hasGameContext = gameContext && (gameContext.gameToday || gameContext.gameTomorrow || gameContext.playedYesterday);
  const [generated] = useState(() => generateWorkout(day, fatigueMod, env, gameContext));
  const [completed, setCompleted] = useState({});
  const [drillPRs, setDrillPRs] = useState({});
  const [showDrill, setShowDrill] = useState(null);

  const gameNotice = (() => {
    if (!gameContext) return null;
    if (gameContext.gameToday && gameContext.gameTomorrow) return '⚠️ Back-to-back games — minimal training today';
    if (gameContext.gameToday) return '🏀 Game today — pre-game warmup mode';
    if (gameContext.gameTomorrow) return '🏀 Game tomorrow — keeping your legs fresh';
    if (gameContext.playedYesterday) return '💤 Recovery day — you played yesterday';
    return null;
  })();

  const envInfo = (ENVIRONMENTS || []).find(e => e.id === env);
  const hasSubstitutions = generated.sections.some(s => s.substituted);
  const totalDrills = generated.sections.reduce((a, s) => a + s.drills.length, 0);
  const doneCount = Object.values(completed).filter(Boolean).length;
  const pct = totalDrills > 0 ? Math.round((doneCount / totalDrills) * 100) : 0;
  const allDone = doneCount === totalDrills && totalDrills > 0;

  const finishWorkout = () => {
    let ftMade = 0, ftAttempts = 0, pushupsTotal = 0;
    const newPRs = { ...prs };
    Object.entries(drillPRs).forEach(([did, data]) => {
      const drill = ALL_DRILLS.find(d => d.id === did);
      if (!drill) return;
      if (drill.id === 'sh2' && data.made != null) {
        ftMade += parseInt(data.made) || 0;
        ftAttempts += parseInt(data.att) || 0;
      }
      if (drill.id === 'u1' && data.value != null) {
        pushupsTotal += parseInt(data.value) || 0;
        const n = parseInt(data.value) || 0;
        if (n > (newPRs.maxPushups || 0)) newPRs.maxPushups = n;
      }
      if (drill.trackPR && data.value != null) {
        const n = parseFloat(data.value);
        if (!isNaN(n)) {
          const cur = newPRs[drill.trackPR];
          const lowerBetter = drill.trackPR === 'mileTime' || drill.trackPR === 'suicideTime';
          if (cur == null || (lowerBetter ? n < cur : n > cur)) newPRs[drill.trackPR] = n;
        }
      }
    });
    const ftPct = ftAttempts > 0 ? Math.round((ftMade / ftAttempts) * 100) : 0;
    onPRUpdate(newPRs);
    onSave({ date: todayStr(), completed: true, type: 'training', day, env,
      drillsCompleted: Object.keys(completed).filter(k => completed[k]),
      ftMade, ftAttempts, ftPct, pushupsTotal, drillData: drillPRs });
  };

  const btnStyle = 'background:' + (doneCount === 0 ? 'var(--courtlight)' : allDone ? 'var(--lime)' : 'var(--flame)') +
    ';color:' + (doneCount === 0 ? 'rgba(245,241,232,0.3)' : 'var(--courtlight)') +
    ';border:' + (doneCount === 0 ? '1px solid var(--courtbord)' : 'none');

  return html`
    <div class="space-y-4 fade-in">
      <button onClick=${onExit} class="font-mono text-xs text-chalk-60 uppercase tracking-wider">← back</button>
      <div>
        <div class="flex items-center justify-between gap-2">
          <div class="font-mono text-xs text-flame uppercase tracking-widest">Today's Work</div>
          ${envInfo ? html`
            <div class="bg-courtlight border rounded-full px-3 py-1 text-xs font-mono text-chalk-70">
              ${envInfo.icon} ${envInfo.label}
            </div>
          ` : null}
        </div>
        <h2 class="font-display text-3xl text-chalk">${generated.title}</h2>
        ${gameNotice ? html`
          <div class="mt-2 rounded-lg p-2 text-xs font-mono"
            style="background:rgba(255,107,26,0.15);border:1px solid rgba(255,107,26,0.4);color:var(--flame)">
            ${gameNotice}
          </div>
        ` : null}
        ${fatigueMod && !hasGameContext ? html`
          <div class="mt-2 bg-lime-10 border-lime-30 rounded-lg p-2 text-xs text-lime font-mono">
            ⚡ Auto-adjusted based on your check-in
          </div>
        ` : null}
        ${hasSubstitutions ? html`
          <div class="mt-2 bg-flame-10 border-flame-30 rounded-lg p-2 text-xs text-flame font-mono">
            🔀 Some drills swapped for your setup (${envInfo ? envInfo.label : 'env'})
          </div>
        ` : null}
      </div>
      <div class="bg-courtlight border rounded-full h-3 overflow-hidden">
        <div class="progress-bar h-full" style=${'width:' + pct + '%'}></div>
      </div>
      <div class="flex justify-between font-mono text-xs text-chalk-60 uppercase tracking-wider">
        <span>${doneCount} / ${totalDrills} done</span>
        <span>${pct}%</span>
      </div>
      ${generated.sections.map((section, i) => html`
        <div key=${i} class="bg-courtlight border rounded-2xl p-4">
          <div class="font-mono text-xs text-flame uppercase tracking-widest mb-3">
            Block ${i + 1} · ${section.label}
            ${section.substituted ? html`<span class="ml-2 text-chalk-50" style="text-transform:none;letter-spacing:normal">(swapped for env)</span>` : null}
          </div>
          <div class="space-y-2">
            ${section.drills.map(d => html`
              <${DrillRow} key=${d.id} drill=${d} done=${completed[d.id]}
                onToggle=${() => setCompleted(c => ({ ...c, [d.id]: !c[d.id] }))}
                onInfo=${() => setShowDrill(d)}
                prData=${drillPRs[d.id]}
                setPRData=${(data) => setDrillPRs(p => ({ ...p, [d.id]: data }))} />
            `)}
          </div>
        </div>
      `)}
      <button onClick=${finishWorkout} disabled=${doneCount === 0}
        class="w-full font-display text-2xl py-4 rounded-2xl" style=${btnStyle}>
        ${allDone ? '🔥 Finish & Save' : doneCount === 0 ? 'Complete drills to finish' : 'Save Progress'}
      </button>
      ${showDrill ? html`<${DrillModal} drill=${showDrill} onClose=${() => setShowDrill(null)} />` : null}
    </div>
  `;
}

    return days >= 0 && days <= 6 && w.completed && w.type !== 'rest';

  const needsRest = recent7.length >= 6;

  return html`
    <div class="space-y-4 fade-in">
      <div class="bg-courtlight border rounded-2xl p-5 flame-border">

        ${template.duration > 0 ? html`<div class="font-mono text-xs text-chalk-60 mt-1">~ ${template.duration} min</div>` : null}

// TODAY TAB
function TodayTab({ workouts, checkins, prs, saveWorkout, saveCheckin, savePRs, saveGame }) {
  const today = todayStr();
  const day = dayName();
  const todayCheckin = checkins.find(c => c.date === today);
  const todayWorkout = workouts.find(w => w.date === today);
  const [view, setView] = useState('home');
  const [env, setEnv] = useState(getLastEnv());

  useEffect(() => {
    if (!todayCheckin && view === 'home') setView('checkin');
  }, []);

  const template = WEEKLY_TEMPLATE[day];
  const isGameDay = template.type === 'gameday';

  if (view === 'checkin') {
    return html`<${CheckIn} existing=${todayCheckin}
      onSave=${async (ci) => { await saveCheckin(ci); setView('home'); }}
      onSkip=${() => setView('home')} />`;
  }
  if (view === 'envpick') {
    return html`<${EnvPicker} defaultEnv=${env}
      onPick=${(e) => { setEnv(e); saveLastEnv(e); setView('workout'); }}
      onCancel=${() => setView('home')} />`;
  }
  if (view === 'workout') {
    return html`<${WorkoutView} day=${day} checkin=${todayCheckin} env=${env}
      onSave=${async (w) => { await saveWorkout(w); setView('home'); }}
      onPRUpdate=${savePRs} prs=${prs} onExit=${() => setView('home')} />`;
  }
  if (view === 'gameday') {
    return html`<${GameDayView} onLogGame=${() => setView('logGame')} onExit=${() => setView('home')} />`;
  }
  if (view === 'logGame') {
    return html`<${LogGame}
      onSave=${async (g) => {
        await saveGame(g);
        await saveWorkout({ date: today, completed: true, type: 'game', day });
        setView('home');
      }}
      onCancel=${() => setView('home')} />`;
  }

  return html`<${TodayHome} today=${today} day=${day} template=${template} isGameDay=${isGameDay}
    todayCheckin=${todayCheckin} todayWorkout=${todayWorkout} currentEnv=${env}
    onStartCheckin=${() => setView('checkin')}
    onStartWorkout=${() => setView('envpick')}
    onGameDay=${() => setView('gameday')}
    onLogGame=${() => setView('logGame')}
    onChangeEnv=${() => setView('envpick')}
    onTakeRest=${async () => {
      await saveWorkout({ date: today, completed: true, type: 'rest', day });
    }}
    workouts=${workouts} />`;
}

// SETTINGS TAB
function SettingsTab({ settings, onSave, workouts, games, profile, profiles, onSwitchProfile, onAddProfile, onDeleteProfile, onViewBadges }) {
  const [saved, setSaved] = useState(false);
  const [importing, setImporting] = useState(false);

  const exportData = async () => {
    const [w, g, c] = await Promise.all([idbGetAll('workouts'), idbGetAll('games'), idbGetAll('checkins')]);
    const data = {
      exportedAt: new Date().toISOString(),
      version: 2,
      profile: profile,
      settings: getSettings(), prs: getPRs(), badges: getUnlockedBadges(),
      workouts: w, games: g, checkins: c
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'hoopers-path-' + (profile ? profile.name.toLowerCase().replace(/\s+/g,'-') + '-' : '') + todayStr() + '.json';
    a.click();
    URL.revokeObjectURL(url);
  };

  const importData = async (file) => {
    setImporting(true);
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data || typeof data !== 'object') throw new Error('Invalid backup file');
      if (!Array.isArray(data.workouts) || !Array.isArray(data.games) || !Array.isArray(data.checkins)) {
        throw new Error('Backup file missing expected data');
      }
      // Confirm with the user before overwriting
      const workoutCount = data.workouts.length;
      const gameCount = data.games.length;
      const backupName = data.profile && data.profile.name ? data.profile.name : 'unknown player';
      const msg = 'Import backup for ' + backupName + '?\n\n' +
        '• ' + workoutCount + ' workouts\n' +
        '• ' + gameCount + ' games\n' +
        '• Exported ' + (data.exportedAt ? new Date(data.exportedAt).toLocaleDateString() : 'unknown date') + '\n\n' +
        'This will ADD to the current player (' + (profile ? profile.name : 'default') + '). Duplicates will be replaced, not merged.';
      if (!confirm(msg)) { setImporting(false); return; }

      // Import localStorage data (PRs, badges, settings) - merge
      if (data.prs) {
        const currentPRs = getPRs();
        const mergedPRs = { ...currentPRs };
        Object.entries(data.prs).forEach(([k, v]) => {
          if (typeof v !== 'number') return;
          const lowerBetter = (k === 'mileTime' || k === 'suicideTime');
          const cur = mergedPRs[k];
          if (cur == null || (lowerBetter ? v < cur : v > cur)) mergedPRs[k] = v;
        });
        savePRsLS(mergedPRs);
      }
      if (data.badges) {
        const currentBadges = getUnlockedBadges();
        saveBadgesLS({ ...currentBadges, ...data.badges });
      }
      if (data.settings) {
        const currentSettings = getSettings();
        saveSettingsLS({ ...currentSettings, ...data.settings });
      }

      // Import IndexedDB data - workouts & checkins keyed by date (profile-scoped), games autoincrement
      const db = await openDB();
      const pid = getActiveProfileId();
      for (const w of data.workouts) {
        await new Promise((resolve, reject) => {
          const tx = db.transaction('workouts', 'readwrite');
          const payload = { ...w, key: pid + '::' + w.date, profile: pid };
          const req = tx.objectStore('workouts').put(payload);
          req.onsuccess = () => resolve();
          req.onerror = () => reject(req.error);
        });
      }
      for (const c of data.checkins) {
        await new Promise((resolve, reject) => {
          const tx = db.transaction('checkins', 'readwrite');
          const payload = { ...c, key: pid + '::' + c.date, profile: pid };
          const req = tx.objectStore('checkins').put(payload);
          req.onsuccess = () => resolve();
          req.onerror = () => reject(req.error);
        });
      }
      for (const g of data.games) {
        await new Promise((resolve, reject) => {
          const tx = db.transaction('games', 'readwrite');
          // Strip old id so it autoincrements fresh for this profile
          const { id, ...rest } = g;
          const payload = { ...rest, profile: pid };
          const req = tx.objectStore('games').add(payload);
          req.onsuccess = () => resolve();
          req.onerror = () => reject(req.error);
        });
      }

      alert('Backup imported successfully! Reloading the app.');
      location.reload();
    } catch (e) {
      alert('Could not import backup: ' + e.message);
      console.error('Import error:', e);
    }
    setImporting(false);
  };

  const onFileChosen = (e) => {
    const file = e.target.files && e.target.files[0];
    if (file) importData(file);
    e.target.value = ''; // reset for next time
  };

  const shareStats = async () => {
    // Build a readable text summary for texting/sharing
    const [w, g] = await Promise.all([idbGetAll('workouts'), idbGetAll('games')]);
    const completed = w.filter(x => x.completed);
    const prs = getPRs();
    const text = [
      '🏀 ' + (profile ? profile.name : 'Player') + ' — Hooper\'s Path',
      '',
      '🔥 Workouts: ' + completed.length,
      '🏀 Games: ' + g.length,
      '🎯 FTs Made: ' + completed.reduce((a,x)=>a+(x.ftMade||0),0),
      '💪 Max Push-ups: ' + (prs.maxPushups || '—'),
      '💪 Max Pull-ups: ' + (prs.maxPullups || '—'),
      '🚀 Vertical: ' + (prs.vertical ? prs.vertical + '"' : '—'),
      '⏱️ Mile: ' + (prs.mileTime ? prs.mileTime + ' min' : '—'),
    ].join('\n');
    if (navigator.share) {
      try { await navigator.share({ text }); } catch(e) {}
    } else {
      // Fallback: copy to clipboard
      try { await navigator.clipboard.writeText(text); alert('Stats copied to clipboard!'); } catch(e) {}
    }
  };

  const clearMyData = async () => {
    if (!confirm('Erase all YOUR data? Other players on this device are not affected.')) return;
    // Clear this profile's localStorage
    const prefix = 'hp_' + (profile ? profile.id : 'default') + '_';
    const toRemove = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(prefix)) toRemove.push(k);
    }
    toRemove.forEach(k => localStorage.removeItem(k));
    // Clear this profile's indexedDB entries
    const db = await openDB();
    const pid = profile ? profile.id : null;
    await Promise.all(['workouts', 'games', 'checkins'].map(store => new Promise((res, rej) => {
      const tx = db.transaction(store, 'readwrite');
      const objStore = tx.objectStore(store);
      const cursorReq = objStore.openCursor();
      cursorReq.onsuccess = (ev) => {
        const cursor = ev.target.result;
        if (cursor) {
          if (cursor.value.profile === pid) cursor.delete();
          cursor.continue();
        } else res();
      };
      cursorReq.onerror = () => rej(cursorReq.error);
    })));
    location.reload();
  };

  return html`
    <div class="space-y-4 fade-in">
      <div>
        <div class="font-mono text-xs text-flame uppercase tracking-widest">Settings</div>
        <h2 class="font-display text-3xl text-chalk">More</h2>
      </div>

      ${profile ? html`
        <div class="bg-courtlight border rounded-2xl p-4">
          <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full flex items-center justify-center font-display text-xl shrink-0"
              style=${'background:' + profile.color + ';color:var(--courtlight)'}>
              ${profile.name[0].toUpperCase()}
            </div>
            <div class="flex-1">
              <div class="font-mono text-10 text-chalk-60 uppercase tracking-wider">Active Player</div>
              <div class="font-display text-2xl text-chalk leading-tight">${profile.name}</div>
            </div>
          </div>
        </div>
      ` : null}

      <div class="bg-courtlight border rounded-2xl p-4 space-y-3">
        <div class="font-mono text-xs text-chalk-60 uppercase tracking-wider">Players on this device</div>
        <div class="space-y-2">
          ${(profiles || []).map(p => {
            const isActive = profile && p.id === profile.id;
            return html`
              <div key=${p.id} class="flex items-center gap-3 p-2 rounded-xl"
                style=${'background:' + (isActive ? 'rgba(255,107,26,0.1)' : 'var(--court)') +
                  ';border:1px solid ' + (isActive ? 'rgba(255,107,26,0.3)' : 'var(--courtbord)')}>
                <div class="w-10 h-10 rounded-full flex items-center justify-center font-display text-base shrink-0"
                  style=${'background:' + p.color + ';color:var(--courtlight)'}>
                  ${p.name[0].toUpperCase()}
                </div>
                <div class="flex-1">
                  <div class="font-display text-lg text-chalk leading-tight">${p.name}</div>
                  <div class="text-xs text-chalk-50 font-mono">${isActive ? 'active · tap ✕ to remove' : 'tap to switch'}</div>
                </div>
                ${!isActive ? html`
                  <button onClick=${() => onSwitchProfile(p.id)} class="bg-flame text-courtlight px-3 py-1 rounded-lg font-mono text-10 uppercase tracking-wider">Switch</button>
                ` : null}
                <button onClick=${() => { if (confirm('Delete ' + p.name + "'s profile and all their data?")) onDeleteProfile(p.id); }}
                  class="text-chalk-40 text-xs font-mono uppercase px-2">✕</button>
              </div>
            `;
          })}
        </div>
        <button onClick=${onAddProfile} class="w-full bg-flame text-courtlight px-4 py-3 rounded-xl font-display text-lg">
          + Add Another Player
        </button>
      </div>

      <div class="bg-courtlight border rounded-2xl p-4 space-y-3">
        <div class="font-mono text-xs text-chalk-60 uppercase tracking-wider">Your Data</div>
        <div class="text-sm text-chalk" style="opacity:0.8">${workouts.length} workouts · ${games.length} games logged</div>
        <div class="text-xs text-chalk-50">Everything stays on your phone. Export a backup monthly so you don't lose progress if you change phones or reinstall.</div>
        <div class="grid grid-cols-2 gap-2">
          <button onClick=${shareStats} class="bg-flame text-courtlight px-3 py-3 rounded-xl font-mono text-xs uppercase tracking-wider">
            📤 Share Stats
          </button>
          <button onClick=${exportData} class="bg-court border text-chalk px-3 py-3 rounded-xl font-mono text-xs uppercase tracking-wider">
            📥 Backup
          </button>
        </div>
        <label class="block">
          <input type="file" accept="application/json,.json" onChange=${onFileChosen} style="display:none" />
          <div class="bg-court border text-chalk px-3 py-3 rounded-xl font-mono text-xs uppercase tracking-wider text-center"
            style=${'cursor:pointer;opacity:' + (importing ? '0.5' : '1') + ';border-color:rgba(180,255,58,0.3);color:var(--lime)'}>
            ${importing ? '⌛ Importing…' : '📂 Restore from Backup'}
          </div>
        </label>
      </div>

      <${TeamSection} />

      <div class="bg-courtlight border rounded-2xl p-4 space-y-2">
        <div class="font-mono text-xs text-chalk-60 uppercase tracking-wider mb-1">Install on iPhone</div>
        <ol class="text-sm text-chalk space-y-1" style="opacity:0.8">
          <li>Open this app in Safari</li>
          <li>Tap the Share button (box with arrow up)</li>
          <li>Tap "Add to Home Screen"</li>
          <li>Name it and tap Add</li>
        </ol>
        <div class="text-xs text-chalk-50 mt-2">Works offline after first load.</div>
      </div>

      <${AccountSection} />

      <button onClick=${clearMyData} class="w-full bg-courtlight px-4 py-3 rounded-xl font-mono text-xs uppercase tracking-wider"
        style="border:1px solid rgba(255,107,26,0.3);color:rgba(255,107,26,0.8)">
        ⚠ Erase My Data
      </button>
      <div class="text-center text-xs text-chalk-40 font-mono pt-2">Hooper's Path · for the grind</div>
    </div>
  `;
}

  const [playerName, setPlayerName] = useState('');
  const [coachName, setCoachName] = useState('');
  const [busy, setBusy] = useState(false);
  const [message, setMessage] = useState(null);

  useEffect(() => {
    if (!window.HOOPERS_SYNC) return;
    (async () => {
      try {
        const t = await window.HOOPERS_SYNC.getMyTeams();
        setTeams(t);
      } catch (e) {
        setTeams([]);
      }
    })();
  }, []);

  const doJoin = async () => {
    if (!code.trim() || !playerName.trim()) return;
    setBusy(true); setMessage(null);
    try {
      const result = await window.HOOPERS_SYNC.joinTeamByCode(code, playerName);
      setMessage({ ok: true, text: 'Request sent! Your coach needs to approve you before you appear on the team.' });

      const s = getSettings();

      const s = getSettings();
      const teamIds = s.teamIds || [];

      if (window.HOOPERS_SYNC) window.HOOPERS_SYNC.syncSettings({ ...s, teamIds, role: 'coach' }).catch(()=>{});

          <button onClick=${() => { setMode('create'); setMessage(null); }} class="bg-flame text-courtlight px-3 py-3 rounded-xl font-mono text-xs uppercase tracking-wider">
            I'm a Coach
          </button>
        </div>
      ` : mode === 'join' ? html`

          <div>
            <div class="font-mono text-10 text-chalk-60 uppercase tracking-wider mb-1">Team Code</div>
            <input type="text" value=${code} onInput=${e => setCode(e.target.value.toUpperCase())}
              maxlength="6" placeholder="ABC123"

            </button>
          </div>

      ` : html`
        <div class="space-y-3 pt-2">
          <div>

            <input type="text" value=${teamName} onInput=${e => setTeamName(e.target.value)}

// MAIN APP
function App() {
  // Auth state
  const [authSession, setAuthSession] = useState(() => {
    return window.HOOPERS_AUTH ? window.HOOPERS_AUTH.getSession() : { user: null, loading: true };
  });
  const [signInError, setSignInError] = useState(null);

  // Subscribe to auth changes
  useEffect(() => {
    const waitForAuth = () => {
      if (window.HOOPERS_AUTH) {
        const unsub = window.HOOPERS_AUTH.subscribe(s => setAuthSession({ ...s }));
        return unsub;
      }
      // auth.js hasn't loaded yet — listen for ready event
      const onReady = () => {
        const unsub = window.HOOPERS_AUTH.subscribe(s => setAuthSession({ ...s }));
        document.removeEventListener('hoopers-auth-ready', onReady);
        // Store unsub somewhere so effect cleanup works — but since this is inside effect,
        // we just return it from the effect.
      };
      document.addEventListener('hoopers-auth-ready', onReady);
      return () => document.removeEventListener('hoopers-auth-ready', onReady);
    };
    return waitForAuth();
  }, []);

  // Profile state — null means "picker visible"
  const [profiles, setProfiles] = useState(() => listProfiles());
  const [activeId, setActiveId] = useState(() => {
    const aid = getActiveProfileId();
    return aid && listProfiles().find(p => p.id === aid) ? aid : null;
  });
  const [showProfileSwitch, setShowProfileSwitch] = useState(false);

  // When signed in but no local profile, try to restore from cloud
  useEffect(() => {
    if (!authSession.user || activeId || !window.HOOPERS_SYNC) return;
    // Only if we have no local profiles at all
    const existing = listProfiles();
    if (existing.length > 0) return;
    (async () => {
      try {
        const cloudProfile = await window.HOOPERS_SYNC.fetchCloudProfile();
        if (cloudProfile && cloudProfile.name) {
          const p = createProfile(cloudProfile.name, cloudProfile.color || '#ff6b1a');
          setProfiles(listProfiles());
          setActiveProfileId(p.id);
          setActiveId(p.id);
        }
        // If no cloud profile either, fall through to normal profile picker
      } catch (e) {
        console.warn('Cloud profile restore failed:', e);
      }
    })();
  }, [authSession.user, activeId]);

  const [tab, setTab] = useState('today');
  const [workouts, setWorkouts] = useState([]);
  const [games, setGames] = useState([]);
  const [checkins, setCheckins] = useState([]);
  const [prs, setPRsState] = useState({});
  const [badges, setBadgesState] = useState({});
  const [settings, setSettingsState] = useState({});
  const [newBadge, setNewBadge] = useState(null);
  const [loading, setLoading] = useState(true);
  const [hydrating, setHydrating] = useState(false);

  // When signed-in user becomes available AND there's a local profile, hydrate from cloud
  useEffect(() => {
    if (!authSession.user || !activeId || !window.HOOPERS_SYNC) return;
    setHydrating(true);
    (async () => {
      try {
        const result = await window.HOOPERS_SYNC.hydrateFromCloud();
        if (result.ok && result.data) {
          const d = result.data;
          // Cloud is source of truth: merge cloud data into local storage
          // Only if cloud has something — empty cloud means first sign-in, so we push local UP
          const hasCloudData = (d.workouts && d.workouts.length) ||
            (d.games && d.games.length) ||
            (d.prs && Object.keys(d.prs).length) ||
            (d.badges && Object.keys(d.badges).length);
          if (hasCloudData) {
            // Write cloud data into local storage (merge, cloud wins)
            if (d.prs) { savePRsLS(d.prs); setPRsState(d.prs); }
            if (d.badges) { saveBadgesLS(d.badges); setBadgesState(d.badges); }
            if (d.settings) { saveSettingsLS(d.settings); setSettingsState(d.settings); }
            // Write workouts/checkins/games into IDB
            const pid = getActiveProfileId();
            const db = await openDB();
            if (d.workouts.length) {
              await Promise.all(d.workouts.map(w => new Promise((res, rej) => {
                const tx = db.transaction('workouts', 'readwrite');
                const payload = { ...w, key: pid + '::' + w.date, profile: pid };
                const req = tx.objectStore('workouts').put(payload);
                req.onsuccess = () => res();
                req.onerror = () => rej(req.error);
              })));
            }
            if (d.checkins.length) {
              await Promise.all(d.checkins.map(c => new Promise((res, rej) => {
                const tx = db.transaction('checkins', 'readwrite');
                const payload = { ...c, key: pid + '::' + c.date, profile: pid };
                const req = tx.objectStore('checkins').put(payload);
                req.onsuccess = () => res();
                req.onerror = () => rej(req.error);
              })));
            }
            if (d.games.length) {
              await Promise.all(d.games.map(g => new Promise((res, rej) => {
                const tx = db.transaction('games', 'readwrite');
                const { id, ...rest } = g;
                const payload = { ...rest, profile: pid };
                const req = tx.objectStore('games').add(payload);
                req.onsuccess = () => res();
                req.onerror = () => rej(req.error);
              })));
            }
            // Reload local state
            const [w, g, c] = await Promise.all([idbGetAll('workouts'), idbGetAll('games'), idbGetAll('checkins')]);
            setWorkouts(w); setGames(g); setCheckins(c);
          } else {
            // Empty cloud — first time signing in. Push local up.
            const [w, g, c] = await Promise.all([idbGetAll('workouts'), idbGetAll('games'), idbGetAll('checkins')]);
            await window.HOOPERS_SYNC.pushLocalToCloud({
              prs: getPRs(), badges: getUnlockedBadges(), settings: getSettings(),
              workouts: w, games: g, checkins: c,
            });
          }
        }
      } catch (e) {
        console.error('Hydrate flow error:', e);
        // Don't silently fail — show the user what happened
        const el = document.getElementById('error-display');
        if (el) {
          el.style.display = 'block';
          el.textContent = 'SYNC ERROR after sign-in:\n\n' + (e.message || String(e)) +
            '\n\nThis usually means Firestore security rules need to be published, ' +
            'or the Firestore database does not exist yet.\n\n' +
            'Tap to dismiss and continue offline.';
          el.onclick = () => { el.style.display = 'none'; el.onclick = null; };
        }
      }
      setHydrating(false);
    })();
  }, [authSession.user, activeId]);

  // Load all profile-scoped state whenever active profile changes
  useEffect(() => {
    if (!activeId) { setLoading(false); return; }
    setLoading(true);
    (async () => {
      try {
        const [w, g, c] = await Promise.all([idbGetAll('workouts'), idbGetAll('games'), idbGetAll('checkins')]);
        setWorkouts(w || []);
        setGames(g || []);
        setCheckins(c || []);
        setPRsState(getPRs());
        setBadgesState(getUnlockedBadges());
        setSettingsState(getSettings());
      } catch (e) { console.error('Load error:', e); }
      setLoading(false);
    })();
  }, [activeId]);

  useEffect(() => {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(e => console.log('SW:', e));
    }
  }, []);

  const stats = useMemo(() => {
    const completed = workouts.filter(w => w.completed);
    const streak = computeStreak(workouts, checkins);
    const ftMade = completed.reduce((a, w) => a + (w.ftMade || 0), 0);
    const pushupsTotal = completed.reduce((a, w) => a + (w.pushupsTotal || 0), 0);
    const bestFtPct = completed.length > 0 ? Math.max(0, ...completed.map(w => w.ftPct || 0)) : 0;
    const sleepStreak = computeSleepStreak(checkins);
    return {
      streak, workoutCount: completed.length, ftMade, pushupsTotal, bestFtPct,
      pullupPR: prs.maxPullups || 0, gamesPlayed: games.length,
      sleepStreak, checkinCount: checkins.length
    };
  }, [workouts, games, checkins, prs]);

  useEffect(() => {
    if (!activeId) return;
    const newly = evaluateBadges(stats, badges);
    if (newly.length > 0) {
      const updated = { ...badges };
      newly.forEach(b => { updated[b.id] = { unlockedAt: todayStr() }; });
      setBadgesState(updated);
      saveBadgesLS(updated);
      if (window.HOOPERS_SYNC) window.HOOPERS_SYNC.syncBadges(updated).catch(()=>{});
      setNewBadge(newly[0]);
    }
  }, [stats, activeId]);

  const saveWorkout = async (w) => {
    await idbPut('workouts', w);
    setWorkouts(await idbGetAll('workouts'));
    if (window.HOOPERS_SYNC) window.HOOPERS_SYNC.syncWorkout(w).catch(()=>{});
  };
  const saveGame = async (g) => {
    await idbAdd('games', g);
    setGames(await idbGetAll('games'));
    if (window.HOOPERS_SYNC) window.HOOPERS_SYNC.syncGame(g).catch(()=>{});
  };
  const saveCheckin = async (c) => {
    await idbPut('checkins', c);
    setCheckins(await idbGetAll('checkins'));
    if (window.HOOPERS_SYNC) window.HOOPERS_SYNC.syncCheckin(c).catch(()=>{});
  };
  const savePRs = (next) => {
    setPRsState(next);
    savePRsLS(next);
    if (window.HOOPERS_SYNC) window.HOOPERS_SYNC.syncPRs(next).catch(()=>{});
  };
  const onSaveSettings = (s) => {
    setSettingsState(s);
    saveSettingsLS(s);
    if (window.HOOPERS_SYNC) window.HOOPERS_SYNC.syncSettings(s).catch(()=>{});
  };

  // Profile actions
  const onPickProfile = (id) => {
    setActiveProfileId(id);
    setActiveId(id);
    setShowProfileSwitch(false);
    setTab('today');
  };
  const onAddProfile = (name, color) => {
    const p = createProfile(name, color);
    setProfiles(listProfiles());
    onPickProfile(p.id);
    // Sync profile to cloud so it shows up on other devices
    if (window.HOOPERS_SYNC) window.HOOPERS_SYNC.syncProfile(p).catch(()=>{});
  };
  const onDeleteProfile = (id) => {
    deleteProfile(id);
    const fresh = listProfiles();
    setProfiles(fresh);
    if (id === activeId) {
      setActiveId(null);
    }
  };
  const onSwitchProfile = (id) => {
    if (id) {
      onPickProfile(id);
    } else {
      setShowProfileSwitch(true);
    }
  };

  // While auth SDK is still loading, show loading screen
  if (authSession.loading) {
    return html`
      <div class="min-h-screen flex items-center justify-center">
        <div class="font-display text-flame text-5xl">LOADING</div>
      </div>
    `;
  }

  // If not signed in, show sign-in screen
  if (!authSession.user) {
    return html`<${SignInScreen}
      error=${signInError}
      onSignIn=${async () => {
        setSignInError(null);
        if (!window.HOOPERS_AUTH) { setSignInError('Auth not loaded yet — refresh the page'); return; }
        const result = await window.HOOPERS_AUTH.signInWithApple();
        if (result.error) {
          setSignInError(result.error.message || String(result.error));
        }
        // If pending (redirect), the page will navigate away and back
      }} />`;
  }

  // If showing hydration loading
  if (hydrating) {
    return html`
      <div class="min-h-screen flex items-center justify-center">
        <div class="text-center">
          <div class="font-display text-flame text-5xl">SYNCING</div>
          <div class="font-mono text-xs text-chalk-60 mt-2">Loading your stats from the cloud...</div>
        </div>
      </div>
    `;
  }

  // If no active profile, show picker
  if (!activeId || showProfileSwitch) {
    return html`<${ProfilePicker}
      profiles=${profiles}
      onPick=${onPickProfile}
      onAdd=${onAddProfile}
      onDelete=${onDeleteProfile}
      onCancel=${() => setShowProfileSwitch(false)}
      allowCancel=${!!activeId} />`;
  }

  if (loading) {
    return html`
      <div class="min-h-screen flex items-center justify-center">
        <div class="font-display text-flame text-5xl">LOADING</div>
      </div>
    `;
  }

  const current = profiles.find(p => p.id === activeId);

  return html`
    <div class="min-h-screen pb-24">
      ${newBadge ? html`<${BadgeUnlock} badge=${newBadge} onClose=${() => setNewBadge(null)} />` : null}
      <div class="container">
        <${Header} streak=${stats.streak} name=${(current && current.name) || settings.name}
          onSwitchProfile=${onSwitchProfile} profileColor=${current && current.color} />
        <main class="px-4 fade-in">
          ${tab === 'today' ? html`<${TodayTab} workouts=${workouts} checkins=${checkins} prs=${prs}
            saveWorkout=${saveWorkout} saveCheckin=${saveCheckin} savePRs=${savePRs} saveGame=${saveGame} />` : null}
          ${tab === 'drills' ? html`<${DrillsTab} />` : null}
          ${tab === 'progress' ? html`<${ProgressTab} workouts=${workouts} games=${games} prs=${prs} stats=${stats} badges=${badges} />` : null}
          ${tab === 'badges' ? html`<${BadgesTab} unlocked=${badges} /> ` : null}
          ${tab === 'settings' ? html`<${SettingsTab} settings=${settings} onSave=${onSaveSettings} workouts=${workouts} games=${games}
            profile=${current} profiles=${profiles}
            onSwitchProfile=${onSwitchProfile}
            onAddProfile=${() => { setShowProfileSwitch(true); }}
            onDeleteProfile=${onDeleteProfile} /> ` : null}
        </main>
      </div>
      <${TabBar} tab=${tab} setTab=${setTab} />
    </div>
  `;
}

try {
  render(html`<${App} />`, document.getElementById('root'));
} catch (e) { showErr('render', e); throw e; }
</script>

</body>
</html>
